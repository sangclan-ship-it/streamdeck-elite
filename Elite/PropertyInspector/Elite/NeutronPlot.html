<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover">
    <meta name=apple-mobile-web-app-capable content=yes>
    <meta name=apple-mobile-web-app-status-bar-style content=black>
    <title>Neutron Plot</title>
    <link rel="stylesheet" href="../sdpi.css">
    <script src="../sdtools.common.js"></script>
    <script src="../jquery-3.3.1.min.js"></script>
    <script>
        function doClearFile() {
            var input = document.getElementById('csvPath');
            var label = document.getElementById('csvPathFilename');
            if (input) input.value = '';
            if (label) label.innerText = 'No file...';
            document.getElementById('clearFile').value = 'true';
            setSettings();
        }
    </script>
</head>
<body>
    <div class="sdpi-wrapper">

        <div type="group" class="sdpi-item">
            <div class="sdpi-item-label">CSV Route</div>
            <div class="sdpi-item-group">

                <div class="sdpi-item">
                    <div class="sdpi-item-label">File</div>
                    <div class="sdpi-item-group file">
                        <input class="sdpi-item-value sdProperty sdFile" type="file" id="csvPath" accept=".csv" oninput="setSettings()">
                        <label class="sdpi-file-info" for="csvPath" id="csvPathFilename">No file...</label>
                        <label class="sdpi-file-label" for="csvPath">Choose file...</label>
                    </div>
                </div>

                <div class="sdpi-item">
                    <div class="sdpi-item-label">&nbsp;</div>
                    <button class="sdpi-item-value" onclick="doClearFile()">Clear File</button>
                </div>

                <div class="sdpi-item">
                    <div class="sdpi-item-label">Active Route</div>
                    <input class="sdpi-item-value sdProperty" type="text" id="routeLabel" readonly placeholder="None">
                </div>

            </div>
        </div>

        <hr>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Function</div>
            <select class="sdpi-item-value select sdProperty" id="function" oninput="setSettings()">
                <option value="">Blank</option>
                <option value="initializeRoute">Initialize Route</option>
                <option value="previousSystem">Previous System</option>
                <option value="nextSystem">Next System</option>
                <option value="copyCurrent">Copy Current</option>
                <option value="autoPlot">Auto Plot (Spansh)</option>
            </select>
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Long Press</div>
            <select class="sdpi-item-value select sdProperty" id="functionLongPress" oninput="setSettings()">
                <option value="">Blank</option>
                <option value="copyCurrent">Copy Current</option>
                <option value="autoPlot">Auto Plot (Spansh)</option>
                <option value="clearRoute">Clear Route</option>
            </select>
        </div>

        <hr>

        <div type="group" class="sdpi-item">
            <div class="sdpi-item-label">Info Upper</div>
            <div class="sdpi-item-group">
                <div type="color" class="sdpi-item">
                    <div class="sdpi-item-label">Color</div>
                    <input class="sdpi-item-value sdProperty" type="color" id="infoUpperColor" oninput="setSettings()">
                </div>
                <div class="sdpi-item">
                    <div class="sdpi-item-label">Info</div>
                    <select class="sdpi-item-value select sdProperty" id="infoUpper" oninput="setSettings()">
                        <option value="">Blank</option>
                        <option value="routeStatus">Route Status</option>
                        <option value="currentSystemName">Current System</option>
                        <option value="targetSystemName">Target System Name</option>
                        <option value="destinationDistance">Distance to Destination</option>
                        <option value="distanceTravelled">Distance Travelled</option>
                        <option value="distanceTarget">Distance to Target</option>
                        <option value="currentJumpNumber">Current Jump Number</option>
                        <option value="totalJumps">Total Jumps</option>
                        <option value="jumpsRemaining">Jumps Remaining</option>
                        <option value="jumpSummary">Jump Summary</option>
                        <option value="tripPercentage">Trip Percentage</option>
                        <option value="refuelAtTarget">Refuel at Target</option>
                        <option value="neutronAtTarget">Neutron at Target</option>
                        <option value="jumpRange">Jump Range</option>
                        <option value="fuelMain">Fuel (Main Tank)</option>
                    </select>
                </div>
            </div>
        </div>

        <hr>

        <div type="group" class="sdpi-item">
            <div class="sdpi-item-label">Info Mid</div>
            <div class="sdpi-item-group">
                <div type="color" class="sdpi-item">
                    <div class="sdpi-item-label">Color</div>
                    <input class="sdpi-item-value sdProperty" type="color" id="infoMidColor" oninput="setSettings()">
                </div>
                <div class="sdpi-item">
                    <div class="sdpi-item-label">Info</div>
                    <select class="sdpi-item-value select sdProperty" id="infoMid" oninput="setSettings()">
                        <option value="">Blank</option>
                        <option value="routeStatus">Route Status</option>
                        <option value="currentSystemName">Current System</option>
                        <option value="targetSystemName">Target System Name</option>
                        <option value="destinationDistance">Distance to Destination</option>
                        <option value="distanceTravelled">Distance Travelled</option>
                        <option value="distanceTarget">Distance to Target</option>
                        <option value="currentJumpNumber">Current Jump Number</option>
                        <option value="totalJumps">Total Jumps</option>
                        <option value="jumpsRemaining">Jumps Remaining</option>
                        <option value="jumpSummary">Jump Summary</option>
                        <option value="tripPercentage">Trip Percentage</option>
                        <option value="refuelAtTarget">Refuel at Target</option>
                        <option value="neutronAtTarget">Neutron at Target</option>
                        <option value="jumpRange">Jump Range</option>
                        <option value="fuelMain">Fuel (Main Tank)</option>
                    </select>
                </div>
            </div>
        </div>

        <hr>

        <div type="group" class="sdpi-item">
            <div class="sdpi-item-label">Info Lower</div>
            <div class="sdpi-item-group">
                <div type="color" class="sdpi-item">
                    <div class="sdpi-item-label">Color</div>
                    <input class="sdpi-item-value sdProperty" type="color" id="infoLowerColor" oninput="setSettings()">
                </div>
                <div class="sdpi-item">
                    <div class="sdpi-item-label">Info</div>
                    <select class="sdpi-item-value select sdProperty" id="infoLower" oninput="setSettings()">
                        <option value="">Blank</option>
                        <option value="routeStatus">Route Status</option>
                        <option value="destinationDistance">Distance to Destination</option>
                        <option value="distanceTravelled">Distance Travelled</option>
                        <option value="distanceTarget">Distance to Target</option>
                        <option value="currentJumpNumber">Current Jump Number</option>
                        <option value="totalJumps">Total Jumps</option>
                        <option value="jumpsRemaining">Jumps Remaining</option>
                        <option value="jumpSummary">Jump Summary</option>
                        <option value="tripPercentage">Trip Percentage</option>
                        <option value="refuelAtTarget">Refuel at Target</option>
                        <option value="neutronAtTarget">Neutron at Target</option>
                        <option value="jumpRange">Jump Range</option>
                        <option value="fuelMain">Fuel (Main Tank)</option>
                    </select>
                </div>
            </div>
        </div>

        <hr>

        <div type="color" class="sdpi-item">
            <div class="sdpi-item-label">Boost Color</div>
            <input class="sdpi-item-value sdProperty" type="color" id="infoBoostColor" oninput="setSettings()">
        </div>

        <input type="hidden" id="clearFile" class="sdProperty" value="">

    </div>
</body>
</html>
