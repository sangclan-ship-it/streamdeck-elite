<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover">
    <meta name=apple-mobile-web-app-capable content=yes>
    <meta name=apple-mobile-web-app-status-bar-style content=black>
    <title>Mhwlng's Elite</title>
    <link rel="stylesheet" href="../sdpi.css">
    <link rel="stylesheet" href="../jquery.highlight-within-textarea.css">
    <script src="../sdtools.common.js"></script>
    <script src="../jquery-3.3.1.min.js"></script>
    <script src="../jquery.highlight-within-textarea.js"></script>
</head>
<body>
    <div class="sdpi-wrapper">

        <div type="group" class="sdpi-item" id="planetgroup">
            <div class="sdpi-item-label">Targeted Planet</div>
            <div class="sdpi-item-group" id="planetgroup_items">

                <div class="sdpi-item" id="dvPrimaryImage">
                    <div class="sdpi-item-label" onclick="clearFileName('primaryImage');">Image</div>
                    <div class="sdpi-item-group file" id="filepickergroup1">
                        <input class="sdpi-item-value sdProperty sdFile" type="file" id="primaryImage" accept=".jpg, .jpeg, .png, .ico, .gif, .bmp, .tiff" oninput="setSettings()">
                        <label class="sdpi-file-info " for="primaryImage" id="primaryImageFilename">No file...</label>
                        <label class="sdpi-file-label" for="primaryImage">Choose file...</label>
                    </div>
                </div>

                <div type="color" class="sdpi-item" id="dvPrimaryColor">
                    <div class="sdpi-item-label">Color</div>
                    <input class="sdpi-item-value sdProperty" type="color" id="primaryColor" oninput="setSettings()">
                </div>

            </div>
        </div>

        <hr>

        <div type="group" class="sdpi-item" id="defaultgroup">
            <div class="sdpi-item-label">Not Active</div>
            <div class="sdpi-item-group" id="defaultgroup_items">

                <div class="sdpi-item" id="dvDefaultImage">
                    <div class="sdpi-item-label" onclick="clearFileName('defaultImage');">Image</div>
                    <div class="sdpi-item-group file" id="filepickergroup2">
                        <input class="sdpi-item-value sdProperty sdFile" type="file" id="defaultImage" accept=".jpg, .jpeg, .png, .ico, .gif, .bmp, .tiff" oninput="setSettings()">
                        <label class="sdpi-file-info " for="defaultImage" id="defaultImageFilename">No file...</label>
                        <label class="sdpi-file-label" for="defaultImage">Choose file...</label>
                    </div>
                </div>

            </div>
        </div>

        <hr>

        <div type="group" class="sdpi-item" id="highgravitygroup">
            <div class="sdpi-item-label">High Gravity Warning</div>
            <div class="sdpi-item-group" id="highgravitygroup_items">

                <div class="sdpi-item" id="dvHighGravityImage">
                    <div class="sdpi-item-label" onclick="clearFileName('highGravityImage');">Image</div>
                    <div class="sdpi-item-group file" id="filepickergroup3">
                        <input class="sdpi-item-value sdProperty sdFile" type="file" id="highGravityImage" accept=".jpg, .jpeg, .png, .ico, .gif, .bmp, .tiff" oninput="setSettings()">
                        <label class="sdpi-file-info " for="highGravityImage" id="highGravityImageFilename">No file...</label>
                        <label class="sdpi-file-label" for="highGravityImage">Choose file...</label>
                    </div>
                </div>

                <div class="sdpi-item" id="dvHighGravityThreshold">
                    <div class="sdpi-item-label">Threshold (G)</div>
                    <input class="sdpi-item-value sdProperty" type="number" id="highGravityThreshold"
                           min="0.1" max="10" step="0.1" oninput="setSettings()">
                </div>

                <div type="color" class="sdpi-item" id="dvHighGravityColor">
                    <div class="sdpi-item-label">Text Color</div>
                    <input class="sdpi-item-value sdProperty" type="color" id="highGravityColor" oninput="setSettings()">
                </div>

            </div>
        </div>

        <hr>

        <div class="sdpi-item" id="dvTextVerticalPosition">
            <div class="sdpi-item-label">Number Position</div>
            <select class="sdpi-item-value select sdProperty" id="textVerticalPosition" oninput="setSettings()">
                <option value="5">Very Top</option>
                <option value="28">Top</option>
                <option value="34">Top-Middle</option>
                <option value="60">Upper Middle</option>
                <option value="80">Center</option>
                <option value="100">Lower Middle</option>
                <option value="128">Bottom</option>
                <option value="144">Lower Bottom</option>
                <option value="160">Very Bottom</option>
                <option value="175">Near Edge</option>
                <option value="190">Edge</option>
            </select>
        </div>

        <div class="sdpi-item" id="dvTextBold">
            <div class="sdpi-item-label">Bold</div>
            <select class="sdpi-item-value select sdProperty" id="textBold" oninput="setSettings()">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>

    </div>
</body>
</html>
