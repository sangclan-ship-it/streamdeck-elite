<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover">
    <meta name=apple-mobile-web-app-capable content=yes>
    <meta name=apple-mobile-web-app-status-bar-style content=black>
    <title>Mhwlng's Elite</title>
    <link rel="stylesheet" href="../sdpi.css">
    <link rel="stylesheet" href="../jquery.highlight-within-textarea.css">
    <script src="../sdtools.common.js"></script>
    <script src="../jquery-3.3.1.min.js"></script>
    <script src="../jquery.highlight-within-textarea.js"></script>
</head>
<body>
    <div class="sdpi-wrapper">

        <div class="sdpi-item">
            <div class="sdpi-item-label">Info</div>
            <select class="sdpi-item-value select sdProperty" id="infoType" oninput="setSettings()">
                <option value="currentFuel">Current Fuel</option>
                <option value="cargoMass">Cargo Mass</option>
            </select>
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Refresh</div>
            <select class="sdpi-item-value select sdProperty" id="refreshRate" oninput="setSettings()">
                <option value="100">100ms</option>
                <option value="200">200ms</option>
                <option value="500">500ms</option>
                <option value="1000">1000ms</option>
                <option value="2000">2000ms</option>
                <option value="5000">5000ms</option>
            </select>
        </div>

        <hr>

        <div type="group" class="sdpi-item">
            <div class="sdpi-item-label">Background</div>
            <div class="sdpi-item-group">
                <div class="sdpi-item" id="dvPrimaryImage">
                    <div class="sdpi-item-label" onclick="clearFileName('primaryImage');">Image</div>
                    <div class="sdpi-item-group file">
                        <input class="sdpi-item-value sdProperty sdFile" type="file" id="primaryImage" accept=".jpg,.jpeg,.png,.ico,.gif,.bmp,.tiff" oninput="setSettings()">
                        <label class="sdpi-file-info" for="primaryImage" id="primaryImageFilename">No file...</label>
                        <label class="sdpi-file-label" for="primaryImage">Choose file...</label>
                    </div>
                </div>
            </div>
        </div>

        <hr>

        <div type="color" class="sdpi-item">
            <div class="sdpi-item-label">Value Color</div>
            <input class="sdpi-item-value sdProperty" type="color" id="primaryColor" oninput="setSettings()">
        </div>

        <div type="color" class="sdpi-item">
            <div class="sdpi-item-label">Label Color</div>
            <input class="sdpi-item-value sdProperty" type="color" id="labelColor" oninput="setSettings()">
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Position</div>
            <select class="sdpi-item-value select sdProperty" id="textVerticalPosition" oninput="setSettings()">
                <option value="5">Very Top</option>
                <option value="28">Top</option>
                <option value="55">Upper Middle</option>
                <option value="80">Center</option>
                <option value="105">Lower Middle</option>
                <option value="128">Bottom</option>
                <option value="150">Lower Bottom</option>
            </select>
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Bold</div>
            <select class="sdpi-item-value select sdProperty" id="textBold" oninput="setSettings()">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>

    </div>
</body>
</html>
